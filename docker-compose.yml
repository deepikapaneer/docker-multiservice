version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: portfoliodb
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d portfoliodb"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_NAME: portfoliodb
      DB_USER: devops
      DB_PASSWORD: devops123
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata: